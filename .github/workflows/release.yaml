name: Release
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  PHAR_FILE: '.build/cache-warmup.phar'
  REF_NAME: ${{ github.ref_name }}

jobs:
  assets:
    name: 'Build release assets'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      phar-artifact-name: ${{ steps.phar.outputs.artifact-name }}

    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: 'Build PHAR'
        uses: eliashaeussler/gha/.github/actions/build-phar@261c9009ac452372d06c5dae29b9c9496d15f9d7 # 0.1.0
        id: phar
        with:
          target-file: ${{ env.PHAR_FILE }}
          build-dockerfile: true
          gpg-key: ${{ secrets.PHAR_GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.PHAR_GPG_PASSPHRASE }}

      - name: 'Make PHAR executable'
        run: chmod +x "$PHAR_FILE"

      - name: 'Build Docker'
        uses: eliashaeussler/gha/.github/actions/build-docker@261c9009ac452372d06c5dae29b9c9496d15f9d7 # 0.1.0
        with:
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

  docs:
    name: 'Build and deploy documentation'
    runs-on: ubuntu-latest

    needs: [assets]

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.pages-url }}

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: pages
      cancel-in-progress: true

    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: 'Download PHAR file'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.assets.outputs.phar-artifact-name }}

      - name: 'Make PHAR executable'
        run: chmod +x "$PHAR_FILE"

      - name: 'Publish PHAR file'
        run: |
          mv -v "${PHAR_FILE}" docs/public/
          mv -v "${PHAR_FILE}.asc" docs/public/

      - name: 'Build and deploy docs'
        id: deploy
        uses: eliashaeussler/gha/.github/actions/deploy-pages@261c9009ac452372d06c5dae29b9c9496d15f9d7 # 0.1.0
        with:
          build-command: 'docs:build'
          base-path: 'docs/.vitepress/dist'

      - name: 'Run cache warmup'
        uses: eliashaeussler/cache-warmup-action@a0c1504d177d494a44681009bc6838df654d4b98 # v1
        with:
          sitemaps: ${{ steps.deploy.outputs.pages-url }}/sitemap.xml
          progress: true
          verbosity: v

  release:
    name: 'Create release'
    runs-on: ubuntu-latest

    if: ${{ github.event_name != 'workflow_dispatch' }}

    needs: [assets]

    permissions:
      contents: write

    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: 'Create release'
        uses: eliashaeussler/gha/.github/actions/create-release@261c9009ac452372d06c5dae29b9c9496d15f9d7 # 0.1.0
        with:
          artifact-name: ${{ needs.assets.outputs.phar-artifact-name }}
