name: Release
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  PHAR_FILE: '.build/cache-warmup.phar'
  REF_NAME: ${{ github.ref_name }}

jobs:
  assets:
    name: 'Build release assets'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      phar-artifact-name: ${{ steps.phar.outputs.artifact-name }}

    steps:
      - name: 'Checkout'
        uses: eliashaeussler/gha/.github/actions/checkout@1fb632290bce95f37a13857172e1ac6bf1a821c1 # 0.8.3

      - name: 'Build PHAR'
        uses: eliashaeussler/gha/.github/actions/build-phar@1fb632290bce95f37a13857172e1ac6bf1a821c1 # 0.8.3
        id: phar
        with:
          target-file: ${{ env.PHAR_FILE }}
          build-dockerfile: true
          gpg-key: ${{ secrets.PHAR_GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.PHAR_GPG_PASSPHRASE }}

      - name: 'Make PHAR executable'
        run: chmod +x "$PHAR_FILE"

      - name: 'Build Docker'
        uses: eliashaeussler/gha/.github/actions/build-docker@1fb632290bce95f37a13857172e1ac6bf1a821c1 # 0.8.3
        with:
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Re-upload PHAR artifact without Dockerfile'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.phar.outputs.artifact-name }}
          path: |
            ${{ env.PHAR_FILE }}
            ${{ env.PHAR_FILE }}.asc
          if-no-files-found: error
          overwrite: true

  docs:
    name: 'Build and deploy documentation'
    runs-on: ubuntu-latest

    needs: [assets]

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.pages-url }}

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: pages
      cancel-in-progress: true

    steps:
      - name: 'Checkout'
        uses: eliashaeussler/gha/.github/actions/checkout@1fb632290bce95f37a13857172e1ac6bf1a821c1 # 0.8.3

      - name: 'Download PHAR file'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.assets.outputs.phar-artifact-name }}

      - name: 'Make PHAR executable'
        run: chmod +x "$PHAR_FILE"

      - name: 'Publish PHAR file'
        run: |
          mv -v "${PHAR_FILE}" docs/public/
          mv -v "${PHAR_FILE}.asc" docs/public/

      - name: 'Build and deploy docs'
        id: deploy
        uses: eliashaeussler/gha/.github/actions/deploy-pages@1fb632290bce95f37a13857172e1ac6bf1a821c1 # 0.8.3
        with:
          build-command: 'docs:build'
          base-path: 'docs/.vitepress/dist'

      - name: 'Run cache warmup'
        uses: eliashaeussler/cache-warmup-action@b2f60a92f2d12eadd36d6387d4a8131b69ef9ed9 # 2.0.0
        with:
          sitemaps: ${{ steps.deploy.outputs.pages-url }}/sitemap.xml
          progress: true
          verbosity: v

  release:
    name: 'Create release'

    needs: [assets]
    if: ${{ github.event_name != 'workflow_dispatch' }}

    permissions:
      contents: write

    uses: eliashaeussler/gha/.github/workflows/github-release.yaml@1fb632290bce95f37a13857172e1ac6bf1a821c1 # 0.8.3
    with:
      artifact-name: ${{ needs.assets.outputs.phar-artifact-name }}
